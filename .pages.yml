media:
  input: src/assets/images
  output: /images
content:
  - name: services
    label: Servicios
    type: collection
    path: src/_services
    fields:
      - name: title
        label: Nombre del servicio
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        description: Identificador para URLs (ej. implantologia, ortodoncia)
        required: true
      - name: description
        label: Descripción breve
        type: text
        required: true
      - name: offer
        label: Oferta
        type: string
        description: Opcional (ej. 20% dscto.)
components:
  simpleCallToAction:
    label: Hero Section
    type: object
    fields:
      - name: headline
        label: Headline
        type: text
        required: true
      - name: text
        label: Texto
        type: text